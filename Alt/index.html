<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Henry & Hollis - Save the Date</title>
    <meta
      name="description"
      content="Save the Date for the wedding of Henry & Hollis. December 5th, 2026 in New York City. Details to follow."
    />
    <!-- Google Fonts for an elegant, modern typographic feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Abstract representation of the envelope and card -->
    <div class="wrapper">
      <div class="stamp"></div>
      <div class="card-container">
        <div class="card">
          <div class="pre-title">Save the Date</div>

          <h1 class="title">
            <span class="name">Henry</span>
            <span class="ampersand">&amp;</span>
            <span class="name">Hollis</span>
          </h1>

          <div class="details">
            <p class="date">December 5th, 2026</p>
            <p class="location">New York City</p>
          </div>

          <div class="divider"></div>

          <p class="footer">Details to Follow</p>
        </div>
      </div>
    </div>
  </body>
</html>
